<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin: 0;
        }
        p {
            color: #666;
            font-size: 18px;
        }
        .cat {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
        }
        .hand {
            display: inline-block;
            animation: wave 1s infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(30deg); }
        }
    </style>
</head>
<body>
    <div class="cat">
        🐱
        <span class="hand">👋</span>
    </div>
    <div class="container">
        <h1>Welcome!</h1>
        <p>Learn Git - Get Started Today</p>
    </div>
</body>
</html>
